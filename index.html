<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Krishna Hindu Bakery</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 20px;
      background: #f5f5f5;
    }

    h1 {
      text-align: center;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    input, button {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      font-size: 16px;
    }

    button {
      background: black;
      color: white;
      border: none;
      cursor: pointer;
    }

    .orders {
      margin-top: 20px;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>Krishna Hindu Bakery</h1>

  <input id="shopNameInput" placeholder="Enter Shop Name">

  <input id="productInput" placeholder="Product Name">
  <input id="qtyInput" type="number" placeholder="Quantity">

  <button onclick="placeOrder()">Place Order</button>
  <button onclick="renderOrders()">View Orders</button>
  <button onclick="exportExcel()">Download Excel</button>

  <div id="ordersContainer" class="orders"></div>
</div>

<!-- XLSX -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
document.addEventListener("DOMContentLoaded", function() {

  // ===== INIT SUPABASE =====
  if (!window.supabase) {
    alert("Supabase failed to load");
    return;
  }

  const supabaseClient = supabase.createClient(
    "https://rkzpukaktfnbhoaablnj.supabase.co",
    "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJrenB1a2FrdGZuYmhvYWFibG5qIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYyMDQxOTMsImV4cCI6MjA5MTc4MDE5M30.ZyixvUm-2qTv0YWgghINzg11-Q-Z35Yi-X2DeLVc6ww"
  );

  console.log("App Loaded");

  // ===== SHOP NAME =====
  function getShopName(){
    return localStorage.getItem("shop") || "";
  }

  function saveShopName(name){
    localStorage.setItem("shop", name);
  }

  const shopInput = document.getElementById("shopNameInput");
  shopInput.value = getShopName();

  // ===== PLACE ORDER =====
  window.placeOrder = async function() {

    const shop = shopInput.value.trim();
    const product = document.getElementById("productInput").value.trim();
    const qty = parseInt(document.getElementById("qtyInput").value);

    if (!shop || !product || !qty) {
      alert("Fill all fields");
      return;
    }

    const order = {
      shop_name: shop,
      product_name: product,
      quantity: qty,
      total_cost: qty * 10 // dummy cost
    };

    const { error } = await supabaseClient
      .from("Orders")
      .insert([order]);

    if (error) {
      console.error(error);
      alert("Error saving order");
      return;
    }

    saveShopName(shop);

    alert("Order placed");
  };

  // ===== VIEW ORDERS =====
  window.renderOrders = async function() {

    const { data, error } = await supabaseClient
      .from("Orders")
      .select("*")
      .order("created_at", { ascending: false });

    const container = document.getElementById("ordersContainer");

    if (error) {
      console.error(error);
      container.innerHTML = "Error loading orders";
      return;
    }

    if (!data.length) {
      container.innerHTML = "No orders yet";
      return;
    }

    container.innerHTML = data.map(o => `
      <div>
        ${o.product_name} - ${o.quantity} - ₹${o.total_cost}
      </div>
    `).join("");
  };

  // ===== EXPORT EXCEL =====
  window.exportExcel = async function() {

    const { data } = await supabaseClient
      .from("Orders")
      .select("*");

    if (!data.length) {
      alert("No data");
      return;
    }

    const ws = XLSX.utils.json_to_sheet(data);
    const wb = XLSX.utils.book_new();

    XLSX.utils.book_append_sheet(wb, ws, "Orders");
    XLSX.writeFile(wb, "orders.xlsx");
  };

});
</script>

</body>
</html>
