// ===== SHOP NAME (only localStorage) =====
function getShopName(){return localStorage.getItem("so_shop")||"";}
function saveShopName(n){localStorage.setItem("so_shop",n);}

// ===== REPLACE PLACE ORDER =====
async function placeOrder(){
  const qty=parseInt(document.getElementById("qtyInput").value)||1;
  const shopName=document.getElementById("modalShopName").value.trim();

  if(!shopName){
    showToast("Enter shop name");
    return;
  }

  const order={
    shop_name: shopName,
    product_id: selectedProduct.id,
    product_name: selectedProduct.name,
    category: selectedProduct.category,
    quantity: qty,
    cost_per_unit: selectedProduct.cost,
    total_cost: qty * selectedProduct.cost
  };

  const { error } = await supabaseClient.from("Orders").insert([order]);

  if(error){
    console.error(error);
    showToast("Error placing order");
    return;
  }

  saveShopName(shopName);
  document.getElementById("shopNameInput").value=shopName;

  closeModal();
  showToast("✓ Order placed");
}

// ===== REPLACE RENDER ORDERS =====
async function renderOrders(){
  const { data: orders, error } = await supabaseClient
    .from("Orders")
    .select("*")
    .order("created_at",{ascending:false});

  const container=document.getElementById("ordersContainer");
  const statsRow=document.getElementById("statsRow");

  if(error || !orders?.length){
    statsRow.style.display="none";
    container.innerHTML=`<div class="empty">
      <div class="empty-icon">📋</div>
      <div class="empty-text">No orders yet</div>
    </div>`;
    return;
  }

  const totalValue=orders.reduce((s,o)=>s+(o.total_cost||0),0);

  statsRow.style.display="grid";
  statsRow.innerHTML=`
    <div class="stat-card">
      <div class="stat-label">Total Orders</div>
      <div class="stat-value">${orders.length}</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Order Value</div>
      <div class="stat-value">₹${totalValue.toFixed(2)}</div>
    </div>`;

  container.innerHTML=orders.map(o=>`
    <div class="order-card">
      <div class="order-top">
        <span class="order-id">${o.id}</span>
        <span class="order-date">${new Date(o.created_at).toLocaleString()}</span>
      </div>
      <div class="order-product">${o.product_name}</div>
      <div class="order-meta">
        <span>Qty: <strong>${o.quantity}</strong></span>
        <span>₹${(o.total_cost||0).toFixed(2)}</span>
      </div>
      <div class="order-shop">🏪 ${o.shop_name}</div>
    </div>
  `).join("");
}

// ===== REPLACE EXPORT =====
async function exportExcel(){
  const { data: orders } = await supabaseClient
    .from("Orders")
    .select("*");

  if(!orders?.length){
    showToast("No orders");
    return;
  }

  const ws=XLSX.utils.json_to_sheet(orders);
  const wb=XLSX.utils.book_new();

  XLSX.utils.book_append_sheet(wb,ws,"Orders");
  XLSX.writeFile(wb,"orders.xlsx");

  showToast("✓ Excel downloaded");
}
