<!DOCTYPE html>

<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #F5F3EE;
    --surface: #FFFFFF;
    --surface2: #F0EDE6;
    --ink: #1A1816;
    --ink2: #6B6760;
    --ink3: #9E9B97;
    --accent: #C8401A;
    --accent-light: #FAE8DE;
    --accent-dark: #A33012;
    --green: #2E7D52;
    --green-light: #E3F4EB;
    --border: rgba(26,24,22,0.10);
    --border-strong: rgba(26,24,22,0.18);
    --radius: 14px;
    --radius-sm: 8px;
    --shadow: 0 2px 8px rgba(26,24,22,0.07), 0 1px 2px rgba(26,24,22,0.05);
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;

  html { background: var(--bg); }
  body { font-family: var(--font); background: var(--bg); color: var(--ink); min-height: 100vh; padding-bottom: 100px; }

  .header { background: var(--ink); color: #fff; padding: 14px 18px 12px; position: sticky; top: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; }
  .header-logo { display: flex; align-items: center; gap: 10px; }
  .header-icon { width: 34px; height: 34px; background: var(--accent); border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 17px; }
  .header-title { font-size: 17px; font-weight: 600; letter-spacing: -0.3px; }
  .header-sub { font-size: 10px; color: rgba(255,255,255,0.45); font-family: var(--mono); margin-top: 1px; }
  .cart-bubble { background: var(--accent); color: #fff; border: none; padding: 7px 14px; border-radius: 20px; font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: background 0.15s; }
  .cart-bubble:active { background: var(--accent-dark); }
  .cart-count { background: #fff; color: var(--accent); width: 18px; height: 18px; border-radius: 50%; font-size: 11px; font-weight: 600; display: flex; align-items: center; justify-content: center; font-family: var(--mono); }

  .tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 60px; z-index: 99; }
  .tab { flex: 1; padding: 11px 6px; text-align: center; font-size: 12px; font-weight: 500; color: var(--ink3); cursor: pointer; border: none; background: none; font-family: var(--font); border-bottom: 2px solid transparent; transition: color 0.15s, border-color 0.15s; }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }

  .page { display: none; padding: 14px; }
  .page.active { display: block; }

  .shop-bar { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 11px 14px; margin-bottom: 12px; display: flex; align-items: center; gap: 10px; box-shadow: var(--shadow); }
  .shop-bar-icon { width: 30px; height: 30px; border-radius: 7px; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 15px; flex-shrink: 0; }
  .shop-bar input { border: none; outline: none; background: transparent; font-family: var(--font); font-size: 15px; font-weight: 500; color: var(--ink); flex: 1; min-width: 0; }
  .shop-bar input::placeholder { color: var(--ink3); font-weight: 400; }

  .search-wrap { position: relative; margin-bottom: 12px; }
  .search-wrap input { width: 100%; padding: 11px 14px 11px 38px; border: 1px solid var(--border); border-radius: var(--radius); background: var(--surface); font-family: var(--font); font-size: 14px; color: var(--ink); outline: none; box-shadow: var(--shadow); }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--ink3); pointer-events: none; }

  .filter-row { display: flex; gap: 8px; margin-bottom: 12px; overflow-x: auto; padding-bottom: 2px; }
  .filter-row::-webkit-scrollbar { display: none; }
  .chip { padding: 6px 13px; border-radius: 20px; font-size: 12px; font-weight: 500; white-space: nowrap; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--ink2); font-family: var(--font); transition: all 0.15s; }
  .chip.active { background: var(--ink); color: #fff; border-color: var(--ink); }

  .product-list { display: flex; flex-direction: column; gap: 9px; }
  .product-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px 13px; display: flex; align-items: center; gap: 11px; box-shadow: var(--shadow); transition: border-color 0.15s; }
  .product-card.in-cart { border-color: var(--accent); background: var(--accent-light); }
  .product-avatar { width: 40px; height: 40px; border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
  .product-avatar.durable { background: #FEF3E2; }
  .product-avatar.perishable { background: var(--green-light); }
  .product-info { flex: 1; min-width: 0; }
  .product-name { font-size: 14px; font-weight: 500; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .product-meta { display: flex; gap: 8px; align-items: center; margin-top: 3px; }
  .product-price { font-size: 13px; font-weight: 600; color: var(--accent); font-family: var(--mono); }
  .cat-pill { font-size: 10px; font-weight: 500; padding: 2px 7px; border-radius: 10px; text-transform: uppercase; letter-spacing: 0.3px; }
  .cat-pill.durable { background: #FEF3E2; color: #A05A00; }
  .cat-pill.perishable { background: var(--green-light); color: var(--green); }
  .product-validity { font-size: 11px; color: var(--ink3); margin-top: 2px; }

  .qty-ctrl { display: flex; align-items: center; gap: 0; flex-shrink: 0; }
  .qc-btn { width: 30px; height: 30px; border-radius: 50%; border: 1.5px solid var(--border-strong); background: var(--surface); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink); font-family: var(--font); transition: background 0.1s; flex-shrink: 0; }
  .qc-btn:active { background: var(--surface2); }
  .qc-val { min-width: 32px; text-align: center; font-size: 15px; font-weight: 600; font-family: var(--mono); color: var(--ink); }
  .add-btn { width: 34px; height: 34px; border-radius: 50%; background: var(--accent); color: #fff; font-size: 20px; border: none; cursor: pointer; flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: background 0.15s; }
  .add-btn:active { background: var(--accent-dark); }

  .cart-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--ink); padding: 12px 16px 20px; display: flex; align-items: center; gap: 12px; z-index: 150; transform: translateY(100%); transition: transform 0.25s cubic-bezier(.16,1,.3,1); }
  .cart-bar.visible { transform: translateY(0); }
  .cart-bar-info { flex: 1; }
  .cart-bar-label { font-size: 11px; color: rgba(255,255,255,0.5); font-family: var(--mono); }
  .cart-bar-summary { font-size: 14px; font-weight: 500; color: #fff; margin-top: 2px; }
  .cart-bar-btn { background: var(--accent); color: #fff; border: none; padding: 12px 20px; border-radius: var(--radius-sm); font-family: var(--font); font-size: 14px; font-weight: 600; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
  .cart-bar-btn:active { background: var(--accent-dark); }

  .modal-overlay { position: fixed; inset: 0; background: rgba(26,24,22,0.55); z-index: 200; display: flex; align-items: flex-end; justify-content: center; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal-sheet { background: var(--surface); border-radius: 20px 20px 0 0; padding: 18px 16px 36px; width: 100%; max-width: 520px; transform: translateY(40px); transition: transform 0.25s cubic-bezier(.16,1,.3,1); max-height: 85vh; overflow-y: auto; }
  .modal-overlay.open .modal-sheet { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; border-radius: 2px; background: var(--border-strong); margin: 0 auto 16px; }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 14px; }
  .modal-shop-row { display: flex; align-items: center; gap: 10px; background: var(--bg); border-radius: var(--radius-sm); padding: 10px 12px; margin-bottom: 14px; }
  .modal-shop-row input { border: none; outline: none; background: transparent; font-family: var(--font); font-size: 15px; font-weight: 500; color: var(--ink); flex: 1; }
  .modal-shop-row input::placeholder { color: var(--ink3); font-weight: 400; }

  .cart-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .cart-item:last-child { border-bottom: none; }
  .ci-name { flex: 1; font-size: 14px; font-weight: 500; color: var(--ink); min-width: 0; }
  .ci-id { font-size: 10px; color: var(--ink3); font-family: var(--mono); margin-top: 1px; }
  .ci-qty-ctrl { display: flex; align-items: center; gap: 0; }
  .ci-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border-strong); background: var(--surface2); font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--ink); flex-shrink: 0; }
  .ci-btn:active { background: var(--border); }
  .ci-val { min-width: 28px; text-align: center; font-size: 14px; font-weight: 600; font-family: var(--mono); }
  .ci-price { font-size: 13px; font-weight: 600; font-family: var(--mono); color: var(--accent); min-width: 56px; text-align: right; }
  .ci-del { background: none; border: none; color: var(--ink3); font-size: 17px; cursor: pointer; padding: 0 4px; line-height: 1; }
  .ci-del:active { color: var(--accent); }

  .cart-total-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0 0; margin-top: 4px; border-top: 1.5px solid var(--border-strong); }
  .ct-label { font-size: 14px; font-weight: 600; }
  .ct-value { font-size: 16px; font-weight: 600; font-family: var(--mono); color: var(--accent); }

  .submit-btn { width: 100%; margin-top: 16px; padding: 15px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius); font-family: var(--font); font-size: 16px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: background 0.15s, transform 0.1s; }
  .submit-btn:active { background: var(--accent-dark); transform: scale(0.98); }
  .submit-btn:disabled { background: var(--ink3); cursor: not-allowed; transform: none; }

  .orders-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .orders-title { font-size: 16px; font-weight: 600; }
  .export-btn { background: var(--green); color: #fff; border: none; padding: 8px 13px; border-radius: var(--radius-sm); font-family: var(--font); font-size: 13px; font-weight: 500; cursor: pointer; display: flex; align-items: center; gap: 6px; }
  .export-btn:active { opacity: 0.85; }

  .group-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 12px; box-shadow: var(--shadow); overflow: hidden; }
  .group-header { padding: 11px 13px; background: var(--surface2); border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: flex-start; }
  .group-shop { font-size: 14px; font-weight: 600; }
  .group-meta { font-size: 10px; color: var(--ink3); font-family: var(--mono); margin-top: 2px; }
  .group-date { font-size: 10px; color: var(--ink3); text-align: right; }
  .group-item { display: flex; justify-content: space-between; align-items: center; padding: 9px 13px; border-bottom: 1px solid var(--border); }
  .group-item:last-child { border-bottom: none; }
  .gi-name { font-size: 14px; font-weight: 500; }
  .gi-id { font-size: 10px; color: var(--ink3); font-family: var(--mono); }
  .gi-right { text-align: right; }
  .gi-qty { font-size: 13px; color: var(--ink2); }
  .gi-total { font-size: 13px; font-weight: 600; font-family: var(--mono); color: var(--accent); }

  .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 14px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; box-shadow: var(--shadow); }
  .stat-label { font-size: 11px; color: var(--ink3); margin-bottom: 3px; }
  .stat-value { font-size: 20px; font-weight: 600; font-family: var(--mono); color: var(--ink); }

  .catalog-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 13px; margin-bottom: 9px; box-shadow: var(--shadow); }
  .catalog-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; }
  .catalog-id { font-size: 10px; font-family: var(--mono); color: var(--ink3); }
  .catalog-name { font-size: 14px; font-weight: 600; }
  .catalog-bottom { display: flex; justify-content: space-between; align-items: center; margin-top: 5px; }
  .catalog-price { font-size: 14px; font-weight: 600; color: var(--accent); font-family: var(--mono); }
  .catalog-validity { font-size: 11px; color: var(--ink3); }

  .toast { position: fixed; bottom: 88px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--ink); color: #fff; padding: 11px 20px; border-radius: 30px; font-size: 14px; font-weight: 500; z-index: 300; opacity: 0; transition: opacity 0.2s, transform 0.2s; white-space: nowrap; max-width: 90vw; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .empty { text-align: center; padding: 48px 24px; color: var(--ink3); }
  .empty-icon { font-size: 38px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.4); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>

<div class="header">

</div>

<div class="tabs">

  <button class="tab" id="tab-catalog" onclick="switchTab('catalog')">📦 Catalog</button>
</div>

<div class="page active" id="page-order">

  <div class="product-list" id="productList"></div>
</div>

<div class="page" id="page-orders">
  <div class="orders-header">
    <div class="orders-title">Order History</div>
    <button class="export-btn" onclick="exportExcel()">

  </div>
  <div id="statsRow" class="stats-row" style="display:none"></div>
  <div id="ordersContainer"></div>
</div>

<div class="page" id="page-catalog">

    <div style="font-size:11px;color:var(--ink3);font-family:var(--mono)">46 products</div>
  </div>
  <div class="filter-row" id="catalogFilterRow"></div>
  <div id="catalogGrid"></div>
</div>

<div class="cart-bar" id="cartBar">
  <div class="cart-bar-info">
    <div class="cart-bar-label">CART</div>
    <div class="cart-bar-summary" id="cartBarSummary"></div>
  </div>
  <button class="cart-bar-btn" onclick="openCart()">Review & Place Order →</button>
</div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalIfOutside(event)">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <div class="modal-title">Review Your Order</div>
    <div class="modal-shop-row">
      <span style="font-size:15px">🏪</span>
      <input type="text" id="modalShopName" placeholder="Enter shop name…" maxlength="60"/>
    </div>
    <div id="cartItemsList"></div>
    <div class="cart-total-row">
      <span class="ct-label">Order Total</span>
      <span class="ct-value" id="cartTotalDisplay">₹0.00</span>
    </div>
    <button class="submit-btn" id="submitBtn" onclick="submitOrder()">
      <svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>
      Place Order
    </button>
  </div>
</div>

<div class="toast" id="toast"></div>

  {id:"P036",name:"CHOCOLATE CAKE",      category:"Perishable",cost:120.00,validity:"5 DAY"},
  {id:"P037",name:"TWIST KHARI",         category:"Durable",   cost:56.25, validity:"3 MONTH"},
  {id:"P038",name:"FRUIT CAKE",          category:"Perishable",cost:120.00,validity:"5 DAY"},
  {id:"P039",name:"JEERA BUTTER",        category:"Durable",   cost:22.50, validity:"3 MONTH"},
  {id:"P040",name:"CHOCOLATE BALL",      category:"Perishable",cost:24.00, validity:"5 DAY"},
  {id:"P041",name:"MASKA BUTTER",        category:"Durable",   cost:48.75, validity:"3 MONTH"},
  {id:"P042",name:"CREAM CUP CAKE",      category:"Perishable",cost:16.00, validity:"5 DAY"},
  {id:"P043",name:"ELAICHI TOAST",       category:"Durable",   cost:37.50, validity:"3 MONTH"},
  {id:"P044",name:"JEERA TOAST",         category:"Durable",   cost:37.50, validity:"3 MONTH"},
  {id:"P045",name:"TUTTI FRUTTI TOAST",  category:"Durable",   cost:41.25, validity:"3 MONTH"},
  {id:"P046",name:"CREAM ROLL",          category:"Durable",   cost:52.50, validity:"3 MONTH"},
];

const EMOJI = {Durable:"🍪", Perishable:"🥖"};
let cart = {};
let activeFilter = "All";
let catalogFilter = "All";

function cartCount(){ return Object.values(cart).reduce((s,q)=>s+q,0); }
function cartTotal(){
  return Object.entries(cart).reduce((s,[id,qty])=>{
    const p=PRODUCTS.find(x=>x.id===id);
    return s+(p?p.cost*qty:0);
  },0);
}

function updateCartUI(){
  const count=cartCount();
  const total=cartTotal();
  const bubble=document.getElementById("cartBubble");
  bubble.style.display=count>0?"flex":"none";
  document.getElementById("cartCount").textContent=count;
  const bar=document.getElementById("cartBar");
  bar.classList.toggle("visible",count>0);
  document.getElementById("cartBarSummary").textContent=
    `${count} item${count>1?"s":""} · ₹${total.toFixed(2)}`;
}

function addToCart(pid){
  cart[pid]=(cart[pid]||0)+1;
  updateCartUI();
  renderProducts();
}
function changeCartQty(pid,delta){
  const newQty=(cart[pid]||0)+delta;
  if(newQty<=0){delete cart[pid];}
  else{cart[pid]=newQty;}
  updateCartUI();
  renderProducts();
}
function removeFromCart(pid){
  delete cart[pid];
  updateCartUI();
  renderProducts();
  renderCartItems();
}

function switchTab(tab){
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById("tab-"+tab).classList.add("active");
  document.getElementById("page-"+tab).classList.add("active");
  if(tab==="orders")renderOrders();
  if(tab==="catalog")renderCatalog();
}

function buildFilters(){
  document.getElementById("filterRow").innerHTML=
    ["All","Durable","Perishable"].map(c=>{
      const lbl=c==="All"?"All (46)":c==="Durable"?"🍪 Durable":"🥖 Perishable";
      return`<button class="chip${c===activeFilter?" active":""}" onclick="setFilter('${c}')">${lbl}</button>`;
    }).join("");
}
function setFilter(cat){activeFilter=cat;buildFilters();renderProducts();}

function renderProducts(){
  const q=document.getElementById("searchInput").value.toLowerCase().trim();
  const filtered=PRODUCTS.filter(p=>{
    const mc=activeFilter==="All"||p.category===activeFilter;
    const ms=!q||p.name.toLowerCase().includes(q)||p.id.toLowerCase().includes(q);
    return mc&&ms;
  });
  const list=document.getElementById("productList");
  if(!filtered.length){
    list.innerHTML=`<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">No products found</div></div>`;
    return;
  }
  list.innerHTML=filtered.map(p=>{
    const cls=p.category.toLowerCase();
    const inCart=!!cart[p.id];
    const qty=cart[p.id]||0;
    const priceStr=p.cost>0?`₹${p.cost.toFixed(2)}`:"Price TBD";
    const control=inCart
      ?`<div class="qty-ctrl">
          <button class="qc-btn" onclick="changeCartQty('${p.id}',-1)">−</button>
          <span class="qc-val">${qty}</span>
          <button class="qc-btn" onclick="changeCartQty('${p.id}',1)">+</button>
        </div>`
      :`<button class="add-btn" onclick="addToCart('${p.id}')">+</button>`;
    return`<div class="product-card${inCart?" in-cart":""}">
      <div class="product-avatar ${cls}">${EMOJI[p.category]}</div>
      <div class="product-info">
        <div class="product-name">${p.name}</div>
        <div class="product-meta">
          <span class="product-price">${priceStr}</span>
          <span class="cat-pill ${cls}">${p.category}</span>
        </div>
        <div class="product-validity">Valid: ${p.validity}</div>
      </div>
      ${control}
    </div>`;
  }).join("");
}

function openCart(){
  if(!cartCount()){showToast("Your cart is empty");return;}
  const shopVal=document.getElementById("shopNameInput").value.trim()||getShopName();
  document.getElementById("modalShopName").value=shopVal;
  renderCartItems();
  document.getElementById("modalOverlay").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeModal(){
  document.getElementById("modalOverlay").classList.remove("open");
  document.body.style.overflow="";
}
function closeModalIfOutside(e){if(e.target===document.getElementById("modalOverlay"))closeModal();}

function renderCartItems(){
  const items=Object.entries(cart);
  if(!items.length){closeModal();return;}
  document.getElementById("cartItemsList").innerHTML=items.map(([pid,qty])=>{
    const p=PRODUCTS.find(x=>x.id===pid);
    if(!p)return"";
    const lineTotal=(p.cost*qty).toFixed(2);
    return`<div class="cart-item">
      <div style="flex:1;min-width:0">
        <div class="ci-name">${p.name}</div>
        <div class="ci-id">${p.id} · ₹${p.cost.toFixed(2)}/unit</div>
      </div>
      <div class="ci-qty-ctrl">
        <button class="ci-btn" onclick="ciQty('${pid}',-1)">−</button>
        <span class="ci-val">${qty}</span>
        <button class="ci-btn" onclick="ciQty('${pid}',1)">+</button>
      </div>
      <span class="ci-price">₹${lineTotal}</span>
      <button class="ci-del" onclick="removeFromCart('${pid}')" title="Remove">×</button>
    </div>`;
  }).join("");
  document.getElementById("cartTotalDisplay").textContent=`₹${cartTotal().toFixed(2)}`;
}

function ciQty(pid,delta){
  changeCartQty(pid,delta);
  renderCartItems();
}

function getShopName(){return localStorage.getItem("so_shop")||"";}
function saveShopName(n){localStorage.setItem("so_shop",n);}

function genBatchId(){
  const d=new Date();
  const ds=`${d.getFullYear()}${String(d.getMonth()+1).padStart(2,"0")}${String(d.getDate()).padStart(2,"0")}`;
  return`BATCH-${ds}-${Math.random().toString(36).substring(2,6).toUpperCase()}`;
}

async function submitOrder(){
  const shopName=document.getElementById("modalShopName").value.trim();
  if(!shopName){
    document.getElementById("modalShopName").focus();
    document.getElementById("modalShopName").style.outline="2px solid var(--accent)";
    setTimeout(()=>document.getElementById("modalShopName").style.outline="",2000);
    showToast("Please enter your shop name");
    return;
  }
  if(!cartCount()){showToast("Cart is empty");return;}

  const btn=document.getElementById("submitBtn");
  btn.disabled=true;
  btn.innerHTML=`<span class="spinner"></span> Placing Order…`;

  const batchId=genBatchId();
  const now=new Date();
  // ✅ FIXED: plain readable string that Supabase text column accepts
  const dateStr=now.toLocaleDateString("en-IN",{timeZone:"Asia/Kolkata"})
    +" "+now.toLocaleTimeString("en-IN",{timeZone:"Asia/Kolkata",hour:"2-digit",minute:"2-digit"});

  const rows=Object.entries(cart).map(([pid,qty])=>{
    const p=PRODUCTS.find(x=>x.id===pid);
    return{
      batch_id:     batchId,
      shop_name:    shopName,
      product_id:   pid,
      product_name: p.name,
      category:     p.category,
      quantity:     qty,
      cost_per_unit:p.cost,
      total_cost:   parseFloat((p.cost*qty).toFixed(2)),
      order_date:   dateStr
    };
  });

  const {error}=await sb.from("Orders").insert(rows);

  btn.disabled=false;
  btn.innerHTML=`<svg width="15" height="15" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> Place Order`;

  if(error){
    console.error(error);
    showToast("Error saving order — check console");
    return;
  }

  saveShopName(shopName);
  document.getElementById("shopNameInput").value=shopName;
  cart={};
  updateCartUI();
  renderProducts();
  closeModal();
  showToast(`✓ Order placed — ${rows.length} item${rows.length>1?"s":""} saved`);
}

// ✅ FIXED: order by order_date instead of created_at
async function renderOrders(){
  const container=document.getElementById("ordersContainer");
  const statsRow=document.getElementById("statsRow");
  container.innerHTML=`<div class="empty"><div class="empty-icon" style="font-size:24px">⏳</div><div class="empty-text">Loading…</div></div>`;

  const {data,error}=await sb.from("Orders").select("*").order("id",{ascending:false});

  if(error){
    container.innerHTML=`<div class="empty"><div class="empty-icon">⚠️</div><div class="empty-text">Error loading orders</div></div>`;
    return;
  }
  if(!data||!data.length){
    statsRow.style.display="none";
    container.innerHTML=`<div class="empty"><div class="empty-icon">📋</div><div class="empty-text">No orders yet</div></div>`;
    return;
  }

  const totalValue=data.reduce((s,o)=>s+(o.total_cost||0),0);
  statsRow.style.display="grid";
  statsRow.innerHTML=`
    <div class="stat-card"><div class="stat-label">Total Rows</div><div class="stat-value">${data.length}</div></div>
    <div class="stat-card"><div class="stat-label">Order Value</div><div class="stat-value" style="font-size:14px">₹${totalValue.toFixed(2)}</div></div>`;

  const batches={};
  data.forEach(o=>{
    const key=o.batch_id||o.id;
    if(!batches[key])batches[key]={shop:o.shop_name,date:o.order_date||"",items:[]};
    batches[key].items.push(o);
  });

  container.innerHTML=Object.values(batches).map(b=>{
    const bTotal=b.items.reduce((s,i)=>s+(i.total_cost||0),0);
    return`<div class="group-card">
      <div class="group-header">
        <div>
          <div class="group-shop">🏪 ${b.shop}</div>
          <div class="group-meta">${b.items.length} item${b.items.length>1?"s":""} · ₹${bTotal.toFixed(2)}</div>
        </div>
        <div class="group-date">${b.date}</div>
      </div>
      ${b.items.map(i=>`
        <div class="group-item">
          <div>
            <div class="gi-name">${i.product_name}</div>
            <div class="gi-id">${i.product_id||""}</div>
          </div>
          <div class="gi-right">
            <div class="gi-qty">× ${i.quantity}</div>
            <div class="gi-total">₹${(i.total_cost||0).toFixed(2)}</div>
          </div>
        </div>`).join("")}
    </div>`;
  }).join("");
}

// ✅ FIXED: order by id instead of created_at
async function exportExcel(){
  showToast("Fetching data…");
  const {data}=await sb.from("Orders").select("*").order("id",{ascending:false});
  if(!data||!data.length){showToast("No orders to export");return;}
  const rows=data.map((o,i)=>({
    "Sr.No":i+1,
    "Batch_ID":o.batch_id||"",
    "Date":o.order_date||"",
    "Shop_Name":o.shop_name,
    "Product_ID":o.product_id||"",
    "Product_Name":o.product_name,
    "Category":o.category||"",
    "Quantity":o.quantity,
    "Cost_Per_Unit":o.cost_per_unit||"",
    "Total_Cost":o.total_cost||""
  }));
  const ws=XLSX.utils.json_to_sheet(rows);
  ws["!cols"]=[{wch:6},{wch:22},{wch:20},{wch:22},{wch:8},{wch:26},{wch:12},{wch:10},{wch:14},{wch:12}];
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Orders");
  const dateStr=new Date().toISOString().slice(0,10);
  XLSX.writeFile(wb,`KrishnaHinduBakery_Orders_${dateStr}.xlsx`);
  showToast("✓ Excel downloaded");
}

function renderCatalog(){
  document.getElementById("catalogFilterRow").innerHTML=
    ["All","Durable","Perishable"].map(c=>{
      const lbl=c==="All"?"All":c==="Durable"?"🍪 Durable":"🥖 Perishable";
      return`<button class="chip${c===catalogFilter?" active":""}" onclick="setCatalogFilter('${c}')">${lbl}</button>`;
    }).join("");
  const filtered=catalogFilter==="All"?PRODUCTS:PRODUCTS.filter(p=>p.category===catalogFilter);
  document.getElementById("catalogGrid").innerHTML=filtered.map(p=>{
    const cls=p.category.toLowerCase();
    return`<div class="catalog-card">
      <div class="catalog-top">
        <span class="catalog-id">${p.id}</span>
        <span class="cat-pill ${cls}">${p.category}</span>
      </div>
      <div class="catalog-name">${EMOJI[p.category]} ${p.name}</div>
      <div class="catalog-bottom">
        <span class="catalog-price">${p.cost>0?`₹${p.cost.toFixed(2)}`:"—"}</span>
        <span class="catalog-validity">Valid: ${p.validity}</span>
      </div>
    </div>`;
  }).join("");
}
function setCatalogFilter(cat){catalogFilter=cat;renderCatalog();}

let _tt;
function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  clearTimeout(_tt);_tt=setTimeout(()=>t.classList.remove("show"),2800);
}

document.getElementById("shopNameInput").value=getShopName();
document.getElementById("shopNameInput").addEventListener("input",e=>{
  document.getElementById("modalShopName").value=e.target.value;
});
buildFilters();
renderProducts();
</script>
